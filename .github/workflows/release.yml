name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate module manifest
        run: npm run validate

      - name: Validate release version
        run: |
          node -e 'const fs=require("fs"); const version=JSON.parse(fs.readFileSync("module.json","utf8")).version; if (process.env.GITHUB_REF_NAME !== `v${version}`) throw new Error(`Tag ${process.env.GITHUB_REF_NAME} does not match module version ${version}`);'

      - name: Build package
        run: |
          mkdir -p dist
          zip -r dist/cards-by-kaciquehn.zip \
            module.json README.md \
            images lang packs scripts/migrate-card-images.mjs support \
            -x "packs/decks.db" "packs/*/LOCK" "packs/*/LOG*"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cards-by-kaciquehn.zip
          generate_release_notes: true
