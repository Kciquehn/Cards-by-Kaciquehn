name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate module manifest
        run: |
          node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync('module.json','utf8')); if (m.id !== 'cards-by-kaciquehn') throw new Error('Unexpected module id'); if (!m.download.endsWith('/cards-by-kaciquehn.zip')) throw new Error('Unexpected download URL');"

      - name: Build package
        run: |
          mkdir -p dist
          zip -r dist/cards-by-kaciquehn.zip \
            module.json README.md .gitattributes .gitignore \
            images packs scripts support

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cards-by-kaciquehn.zip
          generate_release_notes: true
